<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProbablyNotALemon | VTuber</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --panel:#11172a;
  --neon:#6ef3ff;
  --neon2:#b26bff;
  --text:#e6f7ff;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  scroll-behavior:smooth;
  background:
    linear-gradient(180deg, #0b0f1a 0%, #0f1628 50%, #0b0f1a 100%),
    radial-gradient(900px 600px at 20% 0%, rgba(178,107,255,.16), transparent 60%),
    radial-gradient(900px 600px at 80% 10%, rgba(110,243,255,.16), transparent 60%);
  background-attachment: fixed;
  color:var(--text);
  font-family:Inter,system-ui,Segoe UI,Roboto,Arial;
}

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:28px;
  padding:18px;
  background:rgba(10,14,28,.65);
  backdrop-filter:blur(12px);
  z-index:10;
  border-bottom:1px solid rgba(110,243,255,.15);
}

nav a{
  color:var(--text);
  text-decoration:none;
  font-weight:600;
  letter-spacing:.08em;
}

nav a:hover{color:var(--neon)}

header{
  min-height:100vh;
  display:grid;
  place-items:center;
  text-align:center;
  padding:120px 20px;
}

h1{
  font-family:Orbitron, sans-serif;
  font-size:clamp(42px,8vw,96px);
  letter-spacing:.08em;
  text-shadow:0 0 20px var(--neon);
}

h2{font-weight:300;margin-top:16px;opacity:.9}

.cta{
  margin-top:36px;
  display:flex;
  gap:18px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:14px 28px;
  border-radius:40px;
  border:1px solid rgba(110,243,255,.4);
  color:var(--text);
  text-decoration:none;
  transition:.3s;
  background:linear-gradient(90deg,rgba(110,243,255,.12),rgba(178,107,255,.12));
}

.btn:hover{
  box-shadow:0 0 24px var(--neon);
  transform:translateY(-2px);
}

section{
  padding:120px 20px;
  max-width:1100px;
  margin:auto;
}

.panel{
  background:var(--panel);
  border:1px solid rgba(110,243,255,.15);
  border-radius:20px;
  padding:40px;
  box-shadow:0 0 40px rgba(110,243,255,.08);
}

.section-title{
  font-family:Orbitron;
  font-size:32px;
  margin-bottom:24px;
  color:var(--neon);
}

iframe{
  width:100%;
  height:420px;
  border-radius:16px;
  border:none;
}

footer{
  padding:60px 20px;
  text-align:center;
  opacity:.7;
}

.glow{
  animation:glow 2.5s ease-in-out infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px var(--neon)}
  to{text-shadow:0 0 30px var(--neon2)}
}
</style>
</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#live">Live</a>
</nav>

<header id="home">
  <div>
    <h1 class="glow">ProbablyNotALemon</h1>
    <h2>VTuber • Chaos • Entertainment</h2>
    <div class="cta">
      <a class="btn" href="#live">Watch Live</a>
      <a class="btn" href="#about">About Me</a>
    </div>
  </div>
</header>

<section id="about">
  <div class="panel">
    <div class="section-title">About Me</div>
    <p>
      Hey! I'm ProbablyNotALemon, a VTuber who streams games, chaos, and fun live on Twitch.
      Expect energy, randomness, and good vibes.
    </p>
  </div>
</section>

<section id="live">
  <div class="panel">
    <div class="section-title">Live Stream</div>

    <!-- IMPORTANT: replace YOURDOMAIN.com with your real hosted domain -->
    <!-- Example: yourusername.github.io -->

    <iframe
      src="https://player.twitch.tv/?channel=probablynotalemon&parent=probablynotalemon.github.io"
      allowfullscreen>
    </iframe>
  </div>
</section>

<footer>
  © 2026 ProbablyNotALemon • All rights reserved
</footer>

</body>
</html>
