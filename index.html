<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProbablyNotALemon | VTuber Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070A12;
  --panel:#0E1426;
  --neon:#6ef3ff;
  --neon2:#b26bff;
  --danger:#ff3b6b;
  --text:#e6f7ff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,system-ui;
  color:var(--text);
  background: radial-gradient(circle at 20% 10%, rgba(110,243,255,.12), transparent 40%),
              radial-gradient(circle at 80% 20%, rgba(178,107,255,.12), transparent 45%),
              linear-gradient(180deg,#070A12,#0B1020);
  overflow-x:hidden;
}

/* LOADING */
#loader{
  position:fixed;inset:0;
  background:#070A12;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;
}

#loader h1{
  font-family:Orbitron;
  color:var(--neon);
  letter-spacing:4px;
  text-shadow:0 0 20px var(--neon);
}

.bar{
  width:200px;height:4px;
  background:#1a1f33;
  margin-top:20px;
  overflow:hidden;
  border-radius:10px;
}

.bar span{
  display:block;
  height:100%;
  width:40%;
  background:linear-gradient(90deg,var(--neon),var(--neon2));
  animation:load 1.2s infinite;
}

@keyframes load{
  0%{transform:translateX(-120%)}
  100%{transform:translateX(300%)}
}

/* NAV */
nav{
  position:fixed;top:0;width:100%;
  display:flex;justify-content:center;
  gap:25px;padding:15px;
  background:rgba(10,15,30,.6);
  backdrop-filter:blur(10px);
  z-index:10;
  border-bottom:1px solid rgba(110,243,255,.1);
}

nav a{
  color:var(--text);
  text-decoration:none;
  font-weight:600;
}
nav a:hover{color:var(--neon)}

header{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
}

h1{
  font-family:Orbitron;
  font-size:clamp(40px,7vw,90px);
  text-shadow:0 0 25px var(--neon);
}

.glow{animation:flicker 2.5s infinite alternate}
@keyframes flicker{
  0%{text-shadow:0 0 10px var(--neon)}
  100%{text-shadow:0 0 35px var(--neon2)}
}

.live-badge{
  margin-top:10px;
  padding:6px 12px;
  border-radius:20px;
  background:rgba(255,59,107,.15);
  border:1px solid var(--danger);
  color:var(--danger);
  font-weight:700;
  letter-spacing:2px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:.4}
  50%{opacity:1}
  100%{opacity:.4}
}

section{padding:100px 20px;max-width:1100px;margin:auto}

.panel{
  background:var(--panel);
  padding:25px;
  border-radius:18px;
  border:1px solid rgba(110,243,255,.1);
}

/* STREAM */
.stream{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.video{flex:2;min-width:300px}
.chat{flex:1;min-width:260px}

iframe{
  width:100%;height:420px;
  border:none;border-radius:12px;
}

/* CONTROLS */
.controls{
  display:flex;gap:10px;margin-top:15px;
}

button{
  background:linear-gradient(90deg,var(--neon),var(--neon2));
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  color:#000;
  font-weight:700;
}

button:hover{transform:scale(1.05)}

/* PARTICLES */
canvas{
  position:fixed;inset:0;
  z-index:-1;
}

footer{
  text-align:center;
  padding:50px;
  opacity:.6;
}
</style>
</head>
<body>

<div id="loader">
  <h1>BOOTING VTUBER SYSTEM</h1>
  <div class="bar"><span></span></div>
</div>

<canvas id="bg"></canvas>

<nav>
  <a href="#home">Home</a>
  <a href="#live">Live</a>
</nav>

<header id="home">
  <h1 class="glow">ProbablyNotALemon</h1>
  <div class="live-badge">● LIVE SYSTEM READY</div>
</header>

<section id="live">
  <div class="panel">

    <div class="stream">

      <div class="video">
        <iframe
          src="https://player.twitch.tv/?channel=probablynotalemon&parent=probablynotalemon.github.io">
        </iframe>

        <div class="controls">
          <button onclick="toggleChat()">Toggle Chat</button>
          <button onclick="window.open('https://twitch.tv/probablynotalemon')">Open Twitch</button>
        </div>
      </div>

      <div class="chat" id="chatBox">
        <iframe
          src="https://www.twitch.tv/embed/probablynotalemon/chat?parent=probablynotalemon.github.io">
        </iframe>
      </div>

    </div>

  </div>
</section>

<footer>© 2026 ProbablyNotALemon</footer>

<script>
// LOADER
window.addEventListener('load',()=>{
  document.getElementById('loader').style.display='none';
});

// CHAT TOGGLE
function toggleChat(){
  const c=document.getElementById('chatBox');
  c.style.display=c.style.display==='none'?'block':'none';
}

// PARTICLES
const c=document.getElementById('bg');
const ctx=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;

let dots=[];
for(let i=0;i<80;i++){
  dots.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5),vy:(Math.random()-.5)})
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle='rgba(110,243,255,.6)';
  dots.forEach(d=>{
    d.x+=d.vx;d.y+=d.vy;
    if(d.x<0||d.x>c.width)d.vx*=-1;
    if(d.y<0||d.y>c.height)d.vy*=-1;
    ctx.beginPath();
    ctx.arc(d.x,d.y,2,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
